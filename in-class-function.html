<!DOCTYPE html>
<html>
<head>
  <title>In Class Function</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background-color: #f0f8ff;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Number Calculator</h1>
<p>Click the button to enter numbers</p>
<button onclick="runFunction()">Start</button>

<p id="result"></p>

<script>
// Function with more than 2 numbers
function customCalc(a, b, c, d) {
  let total = a + b - c + d; // add + subtract
  return total;
}

// Function that runs everything
function runFunction() {
  let num1 = Number(prompt("Enter first number:"));
  let num2 = Number(prompt("Enter second number:"));
  let num3 = Number(prompt("Enter third number:"));
  let num4 = Number(prompt("Enter fourth number:"));

  let answer = customCalc(num1, num2, num3, num4);

  document.getElementById("result").innerHTML =
    "Your result is: " + answer;
}
</script>

</body>
</html>
